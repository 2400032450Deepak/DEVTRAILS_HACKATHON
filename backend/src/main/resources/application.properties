spring.application.name=devtrails-backend

server.port=${PORT:8080}

# PostgreSQL for Render (production)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# MySQL for local development (comment out for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/devtrails
# spring.datasource.username=root
# spring.datasource.password=0Successm@ntr@0
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.expiration=604800000

# OpenWeatherMap API
openweather.api.key=${OPENWEATHER_API_KEY}
openweather.base.url=https://api.openweathermap.org/data/2.5

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
