# ========================================
# DATABASE CONFIGURATION
# ========================================

# For LOCAL development (MySQL)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/dev}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:0Successm@ntr@0}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# For PRODUCTION (PostgreSQL on Render)
# Override with environment variables on Render
# SPRING_DATASOURCE_URL=jdbc:postgresql://...
# SPRING_DATASOURCE_USERNAME=...
# SPRING_DATASOURCE_PASSWORD=...

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Google OAuth Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

server.port=${PORT:8080}
server.address=0.0.0.0

# CORS Configuration - Allow environment variable override
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}