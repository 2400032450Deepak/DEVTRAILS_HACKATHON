spring.application.name=devtrails-backend

server.port=${PORT:8080}

# Database Configuration - Use environment variables for production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/devtrails}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0Successm@ntr@0}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.MySQL8Dialect}

# H2 Console for testing (optional)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.expiration=604800000

# OpenWeatherMap API
openweather.api.key=${OPENWEATHER_API_KEY}
openweather.base.url=https://api.openweathermap.org/data/2.5

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
