# ========================================
# DATABASE CONFIGURATION - MUST use env vars on Render
# ========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# CORS Configuration - Add your Vercel frontend URL
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://devtrails-frontend-main.vercel.app,http://localhost:5173,http://localhost:3000}

# Actuator endpoints
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================================
# AI SERVICE CONFIGURATION - Use Render AI URL
# ========================================
ai.service.url=${AI_SERVICE_URL:https://devtrails-ai.onrender.com/evaluate}
ai.service.timeout=${AI_SERVICE_TIMEOUT:5000}

# ========================================
# PAYMENT CONFIGURATION
# ========================================
razorpay.key.id=${RAZORPAY_KEY_ID:mock_key}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:mock_secret}